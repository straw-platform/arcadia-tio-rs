# Arcadia TIO Rust wrapper public workspace
# Requires cargo-make: cargo install cargo-make

[config]
default_to_workspace = false

[tasks.default]
description = "Show available tasks"
alias = "help"

[tasks.help]
description = "Show available tasks"
script_runner = "@shell"
script = '''
echo "Common tasks:"
echo "  cargo make build              # build all crates with all features"
echo "  cargo make check              # cargo check all crates with all features"
echo "  cargo make test               # run all-feature workspace tests with the local native library"
echo "  cargo make test-matrix        # run default/no-default/optional/all-feature wrapper tests"
echo "  cargo make test-default       # run safe wrapper tests with default features"
echo "  cargo make test-no-default    # run safe wrapper tests with --no-default-features"
echo "  cargo make test-arrow-ndarray # run safe wrapper tests with arrow,ndarray"
echo "  cargo make test-csv-parquet   # run safe wrapper tests with csv,parquet"
echo "  cargo make test-all-features  # run safe wrapper tests with --all-features"
echo "  cargo make fmt                # verify rustfmt"
echo "  cargo make ci                 # fmt + all-feature check + feature test matrix"
echo "  cargo make native-info        # print detected native library path, size, and checksum"
echo ""
echo "Native library:"
echo "  Tasks use ARCADIA_TIO_CAPI_LIB_DIR when set, otherwise native/<rustc-host-triple>/lib."
echo "  The native/ directory is local-only and ignored; do not commit native libraries."
'''

[tasks.native-info]
description = "Print detected native library configuration"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
TARGET_TRIPLE="${TARGET_TRIPLE:-$(rustc -vV | awk '/^host:/ { print $2 }')}"
LINK_KIND="${ARCADIA_TIO_CAPI_LINK_KIND:-dylib}"
LIB_DIR="${ARCADIA_TIO_CAPI_LIB_DIR:-${ARCADIA_TIO_NATIVE_LIB_DIR:-$ROOT_DIR/native/$TARGET_TRIPLE/lib}}"
if [ -n "${ARCADIA_TIO_CAPI_INCLUDE_DIR:-}" ]; then
  INCLUDE_DIR="$ARCADIA_TIO_CAPI_INCLUDE_DIR"
elif [ -z "${ARCADIA_TIO_CAPI_LIB_DIR:-}" ] && [ -z "${ARCADIA_TIO_NATIVE_LIB_DIR:-}" ]; then
  INCLUDE_DIR="$ROOT_DIR/native/$TARGET_TRIPLE/include"
else
  INCLUDE_DIR=""
fi
echo "target_triple=$TARGET_TRIPLE"
echo "link_kind=$LINK_KIND"
echo "native_lib_dir=$LIB_DIR"
if [ ! -d "$LIB_DIR" ]; then
  echo "native library directory is missing" >&2
  echo "Copy libarcadia_tio_capi into native/$TARGET_TRIPLE/lib or set ARCADIA_TIO_CAPI_LIB_DIR." >&2
  exit 1
fi
case "$LINK_KIND:$TARGET_TRIPLE" in
  static:*windows*) CANDIDATES="arcadia_tio_capi.lib libarcadia_tio_capi.a" ;;
  static:*) CANDIDATES="libarcadia_tio_capi.a" ;;
  dylib:*windows*) CANDIDATES="arcadia_tio_capi.dll arcadia_tio_capi.lib" ;;
  dylib:*apple*|dylib:*darwin*) CANDIDATES="libarcadia_tio_capi.dylib" ;;
  dylib:*) CANDIDATES="libarcadia_tio_capi.so" ;;
  *) echo "ARCADIA_TIO_CAPI_LINK_KIND must be dylib or static, got: $LINK_KIND" >&2; exit 1 ;;
esac
FOUND_LIB=""
for name in $CANDIDATES; do
  if [ -f "$LIB_DIR/$name" ]; then
    FOUND_LIB="$LIB_DIR/$name"
    break
  fi
done
if [ -z "$FOUND_LIB" ]; then
  echo "expected native library not found in $LIB_DIR" >&2
  echo "expected one of: $CANDIDATES" >&2
  exit 1
fi
echo "native_lib_file=$FOUND_LIB"
echo "native_lib_size_bytes=$(wc -c < "$FOUND_LIB" | tr -d ' ')"
if command -v sha256sum >/dev/null 2>&1; then
  echo "native_lib_sha256=$(sha256sum "$FOUND_LIB" | awk '{ print $1 }')"
elif command -v shasum >/dev/null 2>&1; then
  echo "native_lib_sha256=$(shasum -a 256 "$FOUND_LIB" | awk '{ print $1 }')"
else
  echo "native_lib_sha256=<sha256sum-or-shasum-not-found>"
fi
if [ -d "$INCLUDE_DIR" ]; then
  echo "native_include_dir=$INCLUDE_DIR"
fi
echo "native_lib_listing:"
ls -l "$LIB_DIR"
'''

[tasks.build]
clear = true
description = "Build all crates with all features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo build --workspace --all-features
'''

[tasks.check]
clear = true
description = "Check all crates with all features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo check --workspace --all-features
'''

[tasks.test]
clear = true
description = "Run all-feature workspace tests with the local native library"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test --workspace --all-features
'''

[tasks.test-default]
clear = true
description = "Run arcadia-tio-rs tests with default features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test -p arcadia-tio-rs
'''

[tasks.test-no-default]
clear = true
description = "Run arcadia-tio-rs tests with --no-default-features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test -p arcadia-tio-rs --no-default-features
'''

[tasks.test-arrow-ndarray]
clear = true
description = "Run arcadia-tio-rs tests with arrow and ndarray features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test -p arcadia-tio-rs --no-default-features --features arrow,ndarray
'''

[tasks.test-csv-parquet]
clear = true
description = "Run arcadia-tio-rs tests with csv and parquet features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test -p arcadia-tio-rs --no-default-features --features csv,parquet
'''

[tasks.test-all-features]
clear = true
description = "Run arcadia-tio-rs tests with --all-features"
script_runner = "@shell"
script = '''
set -e
ROOT_DIR="${CARGO_MAKE_WORKING_DIRECTORY:-$(pwd)}"
"$ROOT_DIR/examples/tutorials/run/with_native_lib.sh" cargo test -p arcadia-tio-rs --all-features
'''

[tasks.test-matrix]
description = "Run public Rust wrapper feature matrix"
dependencies = ["test-default", "test-no-default", "test-arrow-ndarray", "test-csv-parquet", "test-all-features"]

[tasks.fmt]
clear = true
description = "Verify rustfmt"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.ci]
description = "Run fmt, all-feature check, and the feature test matrix"
dependencies = ["fmt", "check", "test-matrix"]
